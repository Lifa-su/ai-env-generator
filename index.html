<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI .env Generator - Create Environment Files for Any Framework</title>
<meta name="description" content="Free online .env file generator with templates for Next.js, Django, Laravel, Express, Flask, and Rails. Generate secure keys, auto-complete variable names, and export .env.example files instantly.">
<meta name="keywords" content="env generator, environment variables, dotenv, .env file, Next.js, Django, Laravel, Express, Flask, Rails, secret key generator">
<meta name="author" content="AI Env Generator">
<meta name="robots" content="index, follow">
<meta property="og:title" content="AI .env Generator - Create Environment Files for Any Framework">
<meta property="og:description" content="Generate .env files with framework templates, secure random keys, and auto-complete. Supports Next.js, Django, Laravel, Express, Flask, Rails.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://lifa-su.github.io/ai-env-generator/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="AI .env Generator">
<meta name="twitter:description" content="Generate .env files with framework templates, secure random keys, and auto-complete.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--border:#2a2a4a;--primary:#e94560;--primary-hover:#ff6b81;--accent:#0f3460;--text:#eee;--text-dim:#8892b0;--success:#00d2d3;--warning:#feca57;--radius:10px;--shadow:0 4px 20px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 0 30px}
header h1{font-size:2.2rem;background:linear-gradient(135deg,var(--primary),var(--success));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
header p{color:var(--text-dim);font-size:1.05rem}
.templates{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:30px}
.tmpl-btn{padding:10px 20px;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);border-radius:var(--radius);cursor:pointer;font-size:.9rem;transition:all .2s}
.tmpl-btn:hover{border-color:var(--primary);color:var(--text)}
.tmpl-btn.active{border-color:var(--primary);background:rgba(233,69,96,.15);color:var(--primary)}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:768px){.main-grid{grid-template-columns:1fr}header h1{font-size:1.6rem}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card h2{font-size:1.1rem;margin-bottom:15px;color:var(--text);display:flex;align-items:center;gap:8px}
.card h2 span{font-size:1.2rem}
.var-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;position:relative}
.var-row input{flex:1;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:monospace;font-size:.9rem;outline:none;transition:border .2s}
.var-row input:focus{border-color:var(--primary)}
.var-row input.key-input{max-width:200px}
.btn-icon{width:36px;height:36px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;flex-shrink:0}
.btn-icon:hover{border-color:var(--primary);color:var(--primary)}
.btn-icon.danger:hover{border-color:#ff4757;color:#ff4757}
.add-row{width:100%;padding:10px;border:2px dashed var(--border);background:transparent;color:var(--text-dim);border-radius:6px;cursor:pointer;font-size:.9rem;transition:all .2s;margin-top:5px}
.add-row:hover{border-color:var(--primary);color:var(--primary)}
textarea{width:100%;min-height:300px;padding:15px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Courier New',monospace;font-size:.9rem;resize:vertical;outline:none;transition:border .2s;line-height:1.5}
textarea:focus{border-color:var(--primary)}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-success{background:var(--success);color:#0f0f1a}
.btn-success:hover{opacity:.85}
.key-gen-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.key-gen-section h3{font-size:1rem;margin-bottom:12px;color:var(--text-dim)}
.key-gen-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.key-gen-row select,.key-gen-row input[type=number]{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none}
.key-gen-row select{min-width:120px}
.key-gen-row input[type=number]{width:80px}
.key-output{flex:1;min-width:200px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--success);font-family:monospace;font-size:.85rem;word-break:break-all}
.autocomplete{position:absolute;top:100%;left:0;width:200px;max-height:180px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;z-index:100;display:none;box-shadow:var(--shadow)}
.autocomplete div{padding:8px 12px;cursor:pointer;font-family:monospace;font-size:.85rem;color:var(--text-dim)}
.autocomplete div:hover,.autocomplete div.selected{background:rgba(233,69,96,.15);color:var(--primary)}
.toast{position:fixed;bottom:30px;right:30px;padding:12px 24px;background:var(--success);color:#0f0f1a;border-radius:var(--radius);font-weight:600;transform:translateY(100px);opacity:0;transition:all .3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.example-preview{margin-top:20px}
.example-preview h3{font-size:1rem;margin-bottom:10px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.example-preview textarea{min-height:200px;color:var(--warning);background:rgba(254,202,87,.03)}
footer{text-align:center;padding:30px 0;color:var(--text-dim);font-size:.85rem}
footer a{color:var(--primary);text-decoration:none}
footer a:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;background:rgba(233,69,96,.15);color:var(--primary);border-radius:4px;font-size:.75rem;margin-left:8px}
</style>
</head>
<body>
<div class="container">
<header>
<h1>⚙️ AI .env Generator</h1>
<p>Generate environment files for any framework — with templates, secure keys, and smart autocomplete</p>
</header>

<div class="templates" id="templates"></div>

<div class="main-grid">
<div class="card">
<h2><span>📝</span> Environment Variables</h2>
<div id="varRows"></div>
<button class="add-row" onclick="addRow()">+ Add Variable</button>
<div class="key-gen-section">
<h3>🔐 Random Key Generator</h3>
<div class="key-gen-row">
<select id="keyType">
<option value="hex">Hex</option>
<option value="base64">Base64</option>
<option value="alphanumeric">Alphanumeric</option>
<option value="url-safe">URL-safe</option>
</select>
<input type="number" id="keyLen" value="32" min="8" max="128" title="Length">
<button class="btn btn-primary" onclick="generateKey()">Generate</button>
<div class="key-output" id="keyOutput">Click generate...</div>
<button class="btn-icon" onclick="copyKeyOutput()" title="Copy">📋</button>
</div>
</div>
</div>

<div class="card">
<h2><span>📄</span> .env Preview</h2>
<textarea id="envPreview" placeholder="# Your .env content will appear here..." spellcheck="false"></textarea>
<div class="actions">
<button class="btn btn-primary" onclick="copyEnv()">📋 Copy .env</button>
<button class="btn btn-secondary" onclick="downloadEnv('.env')">⬇️ Download .env</button>
<button class="btn btn-success" onclick="syncFromEditor()">🔄 Sync from Editor</button>
</div>
<div class="example-preview">
<h3>📋 .env.example <span class="badge">auto-generated</span></h3>
<textarea id="examplePreview" readonly placeholder="# .env.example will be generated automatically..." spellcheck="false"></textarea>
<div class="actions">
<button class="btn btn-secondary" onclick="copyExample()">📋 Copy .env.example</button>
<button class="btn btn-secondary" onclick="downloadEnv('.env.example')">⬇️ Download .env.example</button>
</div>
</div>
</div>
</div>

<footer>
<p>Built with ❤️ for developers — <a href="https://github.com/Lifa-su/ai-env-generator" target="_blank">GitHub</a></p>
</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const TEMPLATES={
'Next.js':{icon:'▲',vars:[['NEXT_PUBLIC_API_URL','http://localhost:3000/api'],['DATABASE_URL','postgresql://user:password@localhost:5432/mydb'],['NEXTAUTH_SECRET',''],['NEXTAUTH_URL','http://localhost:3000'],['NEXT_PUBLIC_SITE_URL','http://localhost:3000'],['NEXT_PUBLIC_GOOGLE_ANALYTICS',''],['NEXT_PUBLIC_STRIPE_KEY','']]},
'Django':{icon:'🐍',vars:[['SECRET_KEY',''],['DEBUG','True'],['ALLOWED_HOSTS','localhost,127.0.0.1'],['DATABASE_URL','postgresql://user:password@localhost:5432/mydb'],['REDIS_URL','redis://localhost:6379/0'],['EMAIL_HOST','smtp.gmail.com'],['EMAIL_PORT','587'],['EMAIL_HOST_USER',''],['EMAIL_HOST_PASSWORD','']]},
'Laravel':{icon:'🔺',vars:[['APP_NAME','Laravel'],['APP_ENV','local'],['APP_KEY',''],['APP_DEBUG','true'],['APP_URL','http://localhost'],['DB_CONNECTION','mysql'],['DB_HOST','127.0.0.1'],['DB_PORT','3306'],['DB_DATABASE','laravel'],['DB_USERNAME','root'],['DB_PASSWORD',''],['MAIL_MAILER','smtp'],['CACHE_DRIVER','file'],['SESSION_DRIVER','file']]},
'Express':{icon:'🟢',vars:[['PORT','3000'],['NODE_ENV','development'],['DATABASE_URL','mongodb://localhost:27017/mydb'],['JWT_SECRET',''],['SESSION_SECRET',''],['CORS_ORIGIN','http://localhost:3000'],['RATE_LIMIT_MAX','100'],['LOG_LEVEL','debug']]},
'Flask':{icon:'🧪',vars:[['FLASK_APP','app.py'],['FLASK_ENV','development'],['SECRET_KEY',''],['DATABASE_URI','sqlite:///app.db'],['REDIS_URL','redis://localhost:6379/0'],['MAIL_SERVER','smtp.gmail.com'],['MAIL_PORT','587'],['MAIL_USERNAME',''],['MAIL_PASSWORD','']]},
'Rails':{icon:'💎',vars:[['RAILS_ENV','development'],['SECRET_KEY_BASE',''],['DATABASE_URL','postgresql://user:password@localhost:5432/mydb'],['REDIS_URL','redis://localhost:6379/0'],['RAILS_MASTER_KEY',''],['RAILS_LOG_LEVEL','debug'],['SMTP_ADDRESS','smtp.gmail.com'],['SMTP_PORT','587']]}
};

const COMMON_VARS=['DATABASE_URL','SECRET_KEY','API_KEY','API_SECRET','JWT_SECRET','SESSION_SECRET','REDIS_URL','PORT','NODE_ENV','DEBUG','APP_ENV','APP_KEY','APP_URL','DB_HOST','DB_PORT','DB_NAME','DB_USER','DB_PASSWORD','DB_CONNECTION','DB_DATABASE','MAIL_HOST','MAIL_PORT','MAIL_USERNAME','MAIL_PASSWORD','MAIL_MAILER','EMAIL_HOST','EMAIL_PORT','SMTP_HOST','SMTP_PORT','AWS_ACCESS_KEY_ID','AWS_SECRET_ACCESS_KEY','AWS_REGION','AWS_BUCKET','S3_BUCKET','STRIPE_KEY','STRIPE_SECRET','GOOGLE_CLIENT_ID','GOOGLE_CLIENT_SECRET','GITHUB_CLIENT_ID','GITHUB_CLIENT_SECRET','FACEBOOK_APP_ID','FACEBOOK_APP_SECRET','TWITTER_API_KEY','TWITTER_API_SECRET','NEXTAUTH_SECRET','NEXTAUTH_URL','NEXT_PUBLIC_API_URL','NEXT_PUBLIC_SITE_URL','CORS_ORIGIN','LOG_LEVEL','SENTRY_DSN','CACHE_DRIVER','QUEUE_CONNECTION','ALLOWED_HOSTS','FLASK_APP','FLASK_ENV','RAILS_ENV','RAILS_MASTER_KEY','SECRET_KEY_BASE','ENCRYPTION_KEY','HASH_SALT'];

const SECRET_KEYS=['SECRET_KEY','APP_KEY','JWT_SECRET','SESSION_SECRET','NEXTAUTH_SECRET','SECRET_KEY_BASE','RAILS_MASTER_KEY','ENCRYPTION_KEY','API_SECRET','HASH_SALT'];

let activeTemplate=null;
let acIndex=-1;

function init(){
const tpl=document.getElementById('templates');
Object.keys(TEMPLATES).forEach(name=>{
const b=document.createElement('button');
b.className='tmpl-btn';
b.textContent=TEMPLATES[name].icon+' '+name;
b.onclick=()=>loadTemplate(name,b);
tpl.appendChild(b);
});
addRow('','');addRow('','');addRow('','');
updatePreview();
}

function loadTemplate(name,btn){
document.querySelectorAll('.tmpl-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
activeTemplate=name;
const rows=document.getElementById('varRows');
rows.innerHTML='';
TEMPLATES[name].vars.forEach(([k,v])=>{
if(SECRET_KEYS.some(s=>k.includes(s))&&!v) v=genRandomStr('hex',32);
addRow(k,v);
});
updatePreview();
toast('Loaded '+name+' template');
}

function addRow(key,val){
if(key===undefined)key='';
if(val===undefined)val='';
const div=document.createElement('div');
div.className='var-row';
div.innerHTML=`<input class="key-input" placeholder="KEY" value="${esc(key)}" oninput="onKeyInput(this)" onkeydown="onKeyDown(event,this)" onfocus="onKeyInput(this)" onblur="setTimeout(()=>hideAC(this),150)"><input placeholder="value" value="${esc(val)}" oninput="updatePreview()"><button class="btn-icon" title="Generate random value" onclick="fillRandom(this)">🎲</button><button class="btn-icon danger" title="Remove" onclick="removeRow(this)">✕</button><div class="autocomplete"></div>`;
document.getElementById('varRows').appendChild(div);
updatePreview();
}

function esc(s){return s.replace(/"/g,'&quot;')}

function removeRow(btn){btn.closest('.var-row').remove();updatePreview()}

function fillRandom(btn){
const row=btn.closest('.var-row');
const valInput=row.querySelectorAll('input')[1];
valInput.value=genRandomStr('hex',32);
updatePreview();
toast('Random value generated');
}

function onKeyInput(input){
const v=input.value.toUpperCase();
input.value=v;
const ac=input.closest('.var-row').querySelector('.autocomplete');
if(v.length<1){ac.style.display='none';return}
const matches=COMMON_VARS.filter(c=>c.includes(v)&&c!==v).slice(0,8);
if(!matches.length){ac.style.display='none';return}
ac.innerHTML='';
acIndex=-1;
matches.forEach(m=>{
const d=document.createElement('div');
d.textContent=m;
d.onmousedown=(e)=>{e.preventDefault();input.value=m;ac.style.display='none';updatePreview()};
ac.appendChild(d);
});
ac.style.display='block';
}

function onKeyDown(e,input){
const ac=input.closest('.var-row').querySelector('.autocomplete');
if(ac.style.display==='none')return;
const items=ac.querySelectorAll('div');
if(e.key==='ArrowDown'){e.preventDefault();acIndex=Math.min(acIndex+1,items.length-1);highlightAC(items)}
else if(e.key==='ArrowUp'){e.preventDefault();acIndex=Math.max(acIndex-1,0);highlightAC(items)}
else if(e.key==='Enter'&&acIndex>=0){e.preventDefault();input.value=items[acIndex].textContent;ac.style.display='none';updatePreview()}
else if(e.key==='Escape'){ac.style.display='none'}
}

function highlightAC(items){items.forEach((it,i)=>it.classList.toggle('selected',i===acIndex))}
function hideAC(input){input.closest('.var-row').querySelector('.autocomplete').style.display='none'}

function updatePreview(){
const rows=document.querySelectorAll('.var-row');
let env='# Generated by AI .env Generator\n# https://lifa-su.github.io/ai-env-generator/\n\n';
let example='# .env.example - Generated by AI .env Generator\n# Copy this file to .env and fill in your values\n\n';
rows.forEach(row=>{
const inputs=row.querySelectorAll('input');
const k=inputs[0].value.trim();
const v=inputs[1].value;
if(!k)return;
const needsQuote=v.includes(' ')||v.includes('#');
const fmtV=needsQuote?`"${v}"`:v;
env+=`${k}=${fmtV}\n`;
const placeholder=getPlaceholder(k,v);
example+=`${k}=${placeholder}\n`;
});
document.getElementById('envPreview').value=env;
document.getElementById('examplePreview').value=example;
}

function getPlaceholder(k,v){
const kl=k.toLowerCase();
if(kl.includes('secret')||kl.includes('key')||kl.includes('password')||kl.includes('token'))return'your_'+kl+'_here';
if(kl.includes('url')||kl.includes('uri'))return'your_'+kl+'_here';
if(kl.includes('host'))return'localhost';
if(kl.includes('port'))return v||'3000';
if(kl.includes('debug'))return'false';
if(kl.includes('env'))return v||'production';
if(v&&v.length<30&&!v.includes('password')&&!v.includes('secret'))return v;
return'your_'+kl+'_here';
}

function syncFromEditor(){
const text=document.getElementById('envPreview').value;
const rows=document.getElementById('varRows');
rows.innerHTML='';
text.split('\n').forEach(line=>{
line=line.trim();
if(!line||line.startsWith('#'))return;
const eq=line.indexOf('=');
if(eq<0)return;
const k=line.substring(0,eq).trim();
let v=line.substring(eq+1).trim();
if((v.startsWith('"')&&v.endsWith('"'))||(v.startsWith("'")&&v.endsWith("'")))v=v.slice(1,-1);
addRow(k,v);
});
updatePreview();
toast('Synced from editor');
}

function genRandomStr(type,len){
const arr=new Uint8Array(len);
crypto.getRandomValues(arr);
if(type==='hex')return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,len);
if(type==='base64')return btoa(String.fromCharCode(...arr)).slice(0,len);
if(type==='url-safe')return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'').slice(0,len);
const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
return Array.from(arr).map(b=>chars[b%chars.length]).join('').slice(0,len);
}

function generateKey(){
const type=document.getElementById('keyType').value;
const len=parseInt(document.getElementById('keyLen').value)||32;
const key=genRandomStr(type,len);
document.getElementById('keyOutput').textContent=key;
}

function copyKeyOutput(){
const t=document.getElementById('keyOutput').textContent;
if(t==='Click generate...')return;
navigator.clipboard.writeText(t);
toast('Key copied!');
}

function copyEnv(){
navigator.clipboard.writeText(document.getElementById('envPreview').value);
toast('.env copied to clipboard!');
}

function copyExample(){
navigator.clipboard.writeText(document.getElementById('examplePreview').value);
toast('.env.example copied!');
}

function downloadEnv(filename){
const content=filename==='.env'?document.getElementById('envPreview').value:document.getElementById('examplePreview').value;
const blob=new Blob([content],{type:'text/plain'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download=filename;
a.click();
URL.revokeObjectURL(a.href);
toast(filename+' downloaded!');
}

function toast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
clearTimeout(t._timer);
t._timer=setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130647" async data-cfasync="false"></script>
</body>
</html>
